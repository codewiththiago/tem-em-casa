name: Distribuir App

on:
  push:
    branches: [main]

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('frontend/android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > frontend/.env

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Copy web assets to Android
        run: |
          mkdir -p frontend/android/app/src/main/assets/public
          cp -r frontend/dist/. frontend/android/app/src/main/assets/public/
          echo "Assets copied:"
          ls frontend/android/app/src/main/assets/public/

      - name: Sync Capacitor (plugins + config)
        run: npx cap sync android --inline
        working-directory: frontend

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > frontend/android/local.properties

      - name: Grant execute permission to gradlew
        run: chmod +x frontend/android/gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: frontend/android

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:457700332490:android:388fdf03e80501932a7533
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: familia
          file: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: "Versão automática — ${{ github.run_number }}"
